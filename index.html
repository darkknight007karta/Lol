<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Happy Birthday 🎉</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: white;
    }

    .page { display: none; padding-top: 80px; }
    .active { display: block; }

    #startScreen {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    button {
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      background: white;
      color: #007BFF;
      font-weight: bold;
    }

    #cake { width: 220px; cursor: pointer; }

    #flames {
      position: absolute;
      top: 8%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
    }

    .spark {
      position: absolute;
      width: 5px;
      height: 5px;
      border-radius: 50%;
    }
  </style>
</head>

<body>

<!-- START -->
<div id="startScreen">
  <button id="startBtn">Tap to Start 🎬</button>
</div>

<!-- PAGE 1 -->
<div id="page1" class="page active">
  <h2>Password</h2>
  <input id="pass">
  <br>
  <button id="enterBtn">Enter</button>
  <p id="wrong"></p>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
  <h2>Ready?</h2>
  <button id="nextBtn">Next</button>
</div>

<!-- COUNT -->
<div id="pageCount" class="page">
  <h1 id="countdown">3</h1>
</div>

<!-- WISH -->
<div id="pageWish" class="page">
  <h1>🎉 HAPPY BIRTHDAY 🎉</h1>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page">

  <h2>Memories</h2>

  <div style="position:relative; display:inline-block;">
    <img id="cake"
      src="https://images.unsplash.com/photo-1599785209796-786432b228bc?w=500">

    <div style="position:absolute; top:55%; left:50%; transform:translate(-50%,-50%);">
      YOUR NAME
    </div>

    <div id="flames">🕯️🕯️🕯️</div>
  </div>

  <p id="cakeMsg" style="display:none;">Wish made 🎉</p>

  <br>
  <button id="celebrateBtn">Celebrate</button>

</div>

<!-- AUDIO (optional, won’t break anything) -->
<audio id="music" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5c6c4b8c71.mp3"></audio>
<audio id="boom" src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_c0a4a6d1a3.mp3"></audio>
<audio id="blow" src="https://cdn.pixabay.com/download/audio/2021/08/09/audio_884fe92c49.mp3"></audio>

<script>

const startBtn = document.getElementById("startBtn");
const enterBtn = document.getElementById("enterBtn");
const nextBtn = document.getElementById("nextBtn");
const celebrateBtn = document.getElementById("celebrateBtn");
const cake = document.getElementById("cake");

// helper
function show(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// START (guaranteed)
startBtn.addEventListener("click", ()=>{
  document.getElementById("startScreen").style.display = "none";

  // try audio but don't depend on it
  ["music","boom","blow"].forEach(id=>{
    let a = document.getElementById(id);
    a.play().then(()=>{ a.pause(); a.currentTime=0; }).catch(()=>{});
  });
});

// PASSWORD
enterBtn.addEventListener("click", ()=>{
  if(document.getElementById("pass").value === "1234"){
    show("page2");
  } else {
    document.getElementById("wrong").innerText = "Wrong password";
  }
});

// NEXT → COUNTDOWN
nextBtn.addEventListener("click", ()=>{
  show("pageCount");

  let count = 3;
  let el = document.getElementById("countdown");

  let i = setInterval(()=>{
    count--;
    el.innerText = count;

    if(count <= 0){
      clearInterval(i);

      show("pageWish");
      document.getElementById("music").play().catch(()=>{});
      fireworksBig();

      setTimeout(()=>{
        show("page3");
      }, 2000);
    }
  }, 1000);
});

// CAKE
cake.addEventListener("click", ()=>{
  document.getElementById("flames").style.display = "none";
  document.getElementById("blow").play().catch(()=>{});

  setTimeout(()=>{
    document.getElementById("cakeMsg").style.display = "block";
    fireworks();
  }, 500);
});

// CELEBRATE
celebrateBtn.addEventListener("click", ()=>{
  for(let i=0;i<5;i++){
    setTimeout(()=>{
      fireworks();
      document.getElementById("boom").play().catch(()=>{});
    }, i*300);
  }
});

// FIREWORKS
function fireworks(){
  for(let i=0;i<20;i++){
    let d=document.createElement("div");
    d.className="spark";
    document.body.appendChild(d);

    let x=window.innerWidth/2;
    let y=window.innerHeight/2;

    d.style.left=x+"px";
    d.style.top=y+"px";

    let a=Math.random()*2*Math.PI;
    let dist=Math.random()*100;

    d.style.background=`hsl(${Math.random()*360},100%,60%)`;

    d.animate([
      {transform:"translate(0,0)",opacity:1},
      {transform:`translate(${Math.cos(a)*dist}px,${Math.sin(a)*dist}px)`,opacity:0}
    ],{duration:600});

    setTimeout(()=>d.remove(),600);
  }
}

function fireworksBig(){
  for(let i=0;i<20;i++){
    fireworks();
  }
}

</script>

</body>
</html>
